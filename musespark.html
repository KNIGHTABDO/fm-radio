<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudio - mmguo's Pilot Episode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a1a1a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .phone {
    width:390px;
    height:780px;
    background:#000;
    border-radius:44px;
    overflow:hidden;
    position:relative;
    box-shadow:0 25px 80px rgba(0,0,0,0.6);
  }
  .top {
    height:460px;
    position:relative;
    background:#000;
    overflow:hidden;
  }
  #bgWave {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }
  .status-bar {
    position:absolute;
    top:0;
    left:0;
    right:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    color:#fff;
    z-index:10;
    pointer-events:none;
  }
  .left {
    display:flex;
    align-items:center;
    gap:8px;
  }
  .avatar {
    width:28px;
    height:28px;
    border-radius:50%;
    object-fit:cover;
  }
  .name {
    font-family:'DotGothic16', monospace;
    font-size:30px;
    line-height:1;
    letter-spacing:1px;
    transform:translateY(2px);
  }
  .nav {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:20px;
    font-size:11px;
    letter-spacing:3.5px;
    font-weight:500;
    opacity:0.9;
    white-space:nowrap;
  }
  .nav span { margin:0 10px; }
  .time {
    font-size:15px;
    font-weight:600;
    letter-spacing:0.5px;
  }
  .paused {
    position:absolute;
    top:54px;
    left:56px;
    color:#22c55e;
    font-size:13px;
    font-weight:500;
    z-index:10;
    transition:opacity 0.3s;
  }
  .paused.hidden { opacity:0; }
  
  .card {
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:#fff;
    border-radius:28px 28px 0 0;
    padding:26px 22px 22px;
    height:360px;
    z-index:20;
  }
  .title {
    font-size:31px;
    font-weight:700;
    line-height:1.15;
    color:#000;
    letter-spacing:-0.3px;
  }
  .subtitle-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:6px;
    margin-bottom:22px;
  }
  .subtitle {
    color:#6b7280;
    font-size:14px;
    font-weight:500;
  }
  .apple-link {
    color:#9ca3af;
    font-size:12px;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:4px;
    font-weight:500;
  }
  .apple-link:hover { color:#6b7280; }
  
  .player-row {
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:8px;
  }
  .play-btn {
    width:32px;
    height:32px;
    border-radius:50%;
    background:#000;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:transform 0.1s;
  }
  .play-btn:active { transform:scale(0.94); }
  .play-btn svg { width:14px; height:14px; fill:#fff; margin-left:1px; }
  
  .progress-wrap {
    flex:1;
    position:relative;
    height:20px;
    display:flex;
    align-items:center;
  }
  .progress-bg {
    position:absolute;
    left:0;
    right:0;
    height:2px;
    background:#e5e7eb;
    border-radius:1px;
  }
  .progress-fill {
    position:absolute;
    left:0;
    height:2px;
    background:#000;
    border-radius:1px;
    width:51.7%;
    transition:width 0.1s linear;
  }
  .progress-handle {
    position:absolute;
    width:8px;
    height:8px;
    background:#000;
    border-radius:50%;
    top:50%;
    transform:translate(-50%, -50%);
    left:51.7%;
    transition:left 0.1s linear;
  }
  .time-display {
    font-size:12px;
    color:#6b7280;
    font-weight:500;
    min-width:68px;
    text-align:right;
  }
  
  .transcript {
    background:#f6f6f6;
    border-radius:18px;
    padding:16px 18px;
    margin-top:18px;
  }
  .transcript-label {
    font-size:13px;
    color:#000;
    font-weight:600;
    margin-bottom:10px;
  }
  .transcript-meta {
    font-size:13px;
    color:#9ca3af;
    margin-bottom:6px;
  }
  .transcript-text {
    font-size:15px;
    line-height:1.45;
    color:#1f2937;
  }
  
  .mini-player {
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:18px;
  }
  .mini-time {
    font-size:14px;
    font-weight:500;
    color:#000;
    min-width:32px;
  }
  #miniWave {
    flex:1;
    height:32px;
  }
  .mini-play {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#000;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    flex-shrink:0;
  }
  .mini-play svg { width:16px; height:16px; fill:#fff; margin-left:2px; }
</style>
</head>

  </div>
</div>

<script>
const bgCanvas = document.getElementById('bgWave');
const bgCtx = bgCanvas.getContext('2d');
const miniCanvas = document.getElementById('miniWave');
const miniCtx = miniCanvas.getContext('2d');

function resize() {
  bgCanvas.width = bgCanvas.offsetWidth * 2;
  bgCanvas.height = bgCanvas.offsetHeight * 2;
  miniCanvas.width = miniCanvas.offsetWidth * 2;
  miniCanvas.height = miniCanvas.offsetHeight * 2;
}
resize();
window.addEventListener('resize', resize);

// Static waveform shape matching the screenshot
const bars = 180;
const staticHeights = [];
for (let i=0; i<bars; i++) {
  const x = i / bars;
  const center = 0.5;
  const dist = Math.abs(x - center);
  // create the iconic shape: low edges, high center with variation
  let h = Math.pow(1 - dist*1.8, 2.2) * 0.85;
  h += Math.sin(i*0.4) * 0.03 + Math.random()*0.04;
  if (x < 0.15 || x > 0.85) h *= 0.3;
  if (x > 0.3 && x < 0.7) h *= 1.1 + Math.sin(i*0.7)*0.15;
  staticHeights.push(Math.max(0.05, Math.min(0.95, h)));
}

let isPlaying = false;
let currentTime = 15;
const duration = 29;
let audioCtx, analyser, source, startTime, pauseOffset = 15;
let animationId;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.8;
}

function createMusicBuffer() {
  const sampleRate = audioCtx.sampleRate;
  const length = duration * sampleRate;
  const buffer = audioCtx.createBuffer(2, length, sampleRate);
  
  for (let ch=0; ch<2; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i=0; i<length; i++) {
      const t = i / sampleRate;
      // Gentle ambient track resembling "If" by Bread - soft, breathy
      const base = 220 * Math.pow(2, Math.sin(t*0.05)*0.1);
      const chord = Math.sin(2*Math.PI*base*t*0.5) * 0.3 +
                    Math.sin(2*Math.PI*base*1.25*t*0.5) * 0.2 +
                    Math.sin(2*Math.PI*base*1.5*t*0.5) * 0.15;
      const breath = Math.sin(2*Math.PI*0.3*t) * 0.05;
      const envelope = Math.min(1, t*2) * Math.exp(-t*0.02);
      data[i] = (chord + breath) * envelope * 0.25;
    }
  }
  return buffer;
}

function play() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  source = audioCtx.createBufferSource();
  source.buffer = createMusicBuffer();
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  
  startTime = audioCtx.currentTime - pauseOffset;
  source.start(0, pauseOffset);
  source.onended = () => { if (isPlaying) pause(); };
  
  isPlaying = true;
  document.getElementById('pausedLabel').classList.add('hidden');
  updateIcons(true);
  animate();
}

function pause() {
  if (source) {
    source.stop();
    source.disconnect();
    pauseOffset = currentTime;
  }
  isPlaying = false;
  document.getElementById('pausedLabel').classList.remove('hidden');
  updateIcons(false);
  cancelAnimationFrame(animationId);
  drawStatic();
}

function updateIcons(playing) {
  const pausePath = 'M6 5h4v14H6zm8 0h4v14h-4z';
  const playPath = 'M8 5v14l11-7z';
  document.getElementById('mainIcon').innerHTML = `<path d="${playing ? pausePath : playPath}"/>`;
  document.getElementById('miniIcon').innerHTML = `<path d="${playing ? pausePath : playPath}"/>`;
}

function togglePlay() {
  isPlaying ? pause() : play();
}

document.getElementById('mainPlay').onclick = togglePlay;
document.getElementById('miniPlay').onclick = togglePlay;

function drawStatic() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);
  bgCtx.fillStyle = '#fff';
  const barW = w / bars * 0.6;
  const gap = w / bars * 0.4;
  
  for (let i=0; i<bars; i++) {
    const x = i * (barW + gap);
    const ht = staticHeights[i] * h * 0.7;
    const y = (h - ht) / 2 + h*0.05;
    bgCtx.fillRect(x, y, barW, ht);
  }
  drawMiniStatic();
}

function drawMiniStatic() {
  const w = miniCanvas.width, h = miniCanvas.height;
  miniCtx.clearRect(0,0,w,h);
  const totalBars = 90;
  const barW = w / totalBars * 0.7;
  
  for (let i=0; i<totalBars; i++) {
    const progress = i / totalBars;
    const isPlayed = progress <= currentTime / duration;
    miniCtx.fillStyle = isPlayed ? '#000' : '#d1d5db';
    const x = i * (w / totalBars);
    const ht = (staticHeights[Math.floor(i*2)] * 0.8 + 0.2) * h * 0.7;
    const y = (h - ht) / 2;
    miniCtx.fillRect(x, y, barW, ht);
  }
}

function animate() {
  if (!isPlaying) return;
  
  currentTime = (audioCtx.currentTime - startTime) % duration;
  pauseOffset = currentTime;
  
  // Update time displays
  const mins = Math.floor(currentTime);
  const sec = String(mins % 60).padStart(2,'0');
  const totalSec = String(duration % 60).padStart(2,'0');
  document.getElementById('timeDisplay').textContent = `0:${sec} / 0:${totalSec}`;
  document.getElementById('miniTime').textContent = `0:${sec}`;
  
  const progress = currentTime / duration;
  document.getElementById('progressFill').style.width = `${progress*100}%`;
  document.getElementById('progressHandle').style.left = `${progress*100}%`;
  
  // Draw animated background wave
  const dataArray = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(dataArray);
  
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);
  bgCtx.fillStyle = '#fff';
  const barW = w / bars * 0.6;
  const gap = w / bars * 0.4;
  
  for (let i=0; i<bars; i++) {
    const dataIdx = Math.floor(i / bars * dataArray.length * 0.7);
    const intensity = dataArray[dataIdx] / 255;
    const baseH = staticHeights[i];
    const dynamicH = baseH * (0.7 + intensity * 0.6);
    const ht = dynamicH * h * 0.7;
    const y = (h - ht) / 2 + h*0.05;
    const x = i * (barW + gap);
    bgCtx.globalAlpha = 0.9 + intensity * 0.1;
    bgCtx.fillRect(x, y, barW, ht);
  }
  bgCtx.globalAlpha = 1;
  
  // Draw mini wave
  drawMiniStatic();
  
  animationId = requestAnimationFrame(animate);
}

// Initial draw
drawStatic();

// Make progress bar clickable
document.querySelector('.progress-wrap').onclick = (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const newTime = (x / rect.width) * duration;
  currentTime = Math.max(0, Math.min(duration, newTime));
  pauseOffset = currentTime;
  if (isPlaying) {
    pause();
    setTimeout(play, 50);
  } else {
    drawMiniStatic();
    const sec = String(Math.floor(currentTime)).padStart(2,'0');
    document.getElementById('timeDisplay').textContent = `0:${sec} / 0:29`;
    document.getElementById('miniTime').textContent = `0:${sec}`;
    document.getElementById('progressFill').style.width = `${currentTime/duration*100}%`;
    document.getElementById('progressHandle').style.left = `${currentTime/duration*100}%`;
  }
};
</script>
</body>
</html>
